name: PR Status Sync (Reusable)

on:
  workflow_call:
    inputs:
      # ── Project configuration ─────────────────────────────────────────────
      PROJECT_ID:
        required: true
        type: string
      PR_STATUS_FIELD_ID:
        required: true
        type: string
      ITERATION_FIELD_ID:
        required: false
        type: string
        default: ''
      OPT_UNASSIGNED:
        required: true
        type: string
      OPT_IN_QUEUE:
        required: true
        type: string
      OPT_BLOCKED:
        required: true
        type: string
      OPT_ON_HOLD:
        required: false
        type: string
        default: ''
      OPT_MERGED:
        required: true
        type: string
      OPT_CLOSED:
        required: true
        type: string
      # ── Caller context ────────────────────────────────────────────────────
      event_name:
        required: true
        type: string
      repo:
        required: true
        type: string
      org:
        required: false
        type: string
        default: ''
      # ── PR event data ─────────────────────────────────────────────────────
      pr_node_id:
        required: false
        type: string
        default: ''
      pr_number:
        required: false
        type: string
        default: ''
      action:
        required: false
        type: string
        default: ''
      label_name:
        required: false
        type: string
        default: ''
      review_state:
        required: false
        type: string
        default: ''
      reviewer_login:
        required: false
        type: string
        default: ''
      # ── repository_dispatch drag data ─────────────────────────────────────
      content_node_id:
        required: false
        type: string
        default: ''
      old_status:
        required: false
        type: string
        default: ''
      new_status:
        required: false
        type: string
        default: ''
      sender:
        required: false
        type: string
        default: ''
    secrets:
      app_id:
        required: true
      app_private_key:
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:

  # ── pull_request_target: opened, reopened ─────────────────────────────────
  open-pr:
    if: inputs.event_name == 'pull_request_target' && (inputs.action == 'opened' || inputs.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - uses: dbbuilder-org/.github/.github/actions/write-helpers@main
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
      - env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PROJECT_ID: ${{ inputs.PROJECT_ID }}
          PR_STATUS_FIELD_ID: ${{ inputs.PR_STATUS_FIELD_ID }}
          ITERATION_FIELD_ID: ${{ inputs.ITERATION_FIELD_ID }}
          OPT_UNASSIGNED: ${{ inputs.OPT_UNASSIGNED }}
          OPT_IN_QUEUE: ${{ inputs.OPT_IN_QUEUE }}
          OPT_BLOCKED: ${{ inputs.OPT_BLOCKED }}
          OPT_ON_HOLD: ${{ inputs.OPT_ON_HOLD }}
          OPT_MERGED: ${{ inputs.OPT_MERGED }}
          OPT_CLOSED: ${{ inputs.OPT_CLOSED }}
          PR_NODE_ID: ${{ inputs.pr_node_id }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.repo }}
        run: |
          source /tmp/pr-helpers.sh
          BASE_REF=$(gh api repos/"$REPO"/pulls/"$PR_NUMBER" --jq '.base.ref')
          BASE_LABEL="base:$BASE_REF"
          gh api repos/"$REPO"/labels -f name="$BASE_LABEL" -f color="0e8a16" >/dev/null 2>&1 || true
          gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels -f "labels[]=$BASE_LABEL"
          ITEM_ID=$(get_item_id "$PR_NODE_ID")
          assign_iteration "$ITEM_ID"
          set_pr_status "$PR_NODE_ID" "$PR_NUMBER" "$REPO"

  # ── pull_request_target: review_requested ────────────────────────────────
  review-requested:
    if: inputs.event_name == 'pull_request_target' && inputs.action == 'review_requested'
    runs-on: ubuntu-latest
    steps:
      - uses: dbbuilder-org/.github/.github/actions/write-helpers@main
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
      - env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PROJECT_ID: ${{ inputs.PROJECT_ID }}
          PR_STATUS_FIELD_ID: ${{ inputs.PR_STATUS_FIELD_ID }}
          OPT_UNASSIGNED: ${{ inputs.OPT_UNASSIGNED }}
          OPT_IN_QUEUE: ${{ inputs.OPT_IN_QUEUE }}
          OPT_BLOCKED: ${{ inputs.OPT_BLOCKED }}
          OPT_ON_HOLD: ${{ inputs.OPT_ON_HOLD }}
          OPT_MERGED: ${{ inputs.OPT_MERGED }}
          OPT_CLOSED: ${{ inputs.OPT_CLOSED }}
          PR_NODE_ID: ${{ inputs.pr_node_id }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.repo }}
          ORG: ${{ inputs.org }}
          REVIEWER_LOGIN: ${{ inputs.reviewer_login }}
        run: |
          source /tmp/pr-helpers.sh
          build_member_maps
          if [[ -n "$REVIEWER_LOGIN" ]]; then
            SIMPLE_NAME="${LOGIN_TO_LABEL[$REVIEWER_LOGIN]:-}"
            if [[ -n "$SIMPLE_NAME" ]]; then
              LABEL="reviewer:$SIMPLE_NAME"
              ALL_LABELS=$(gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels --jq '[.[].name]')
              HAS=$(echo "$ALL_LABELS" | jq --arg l "$LABEL" 'any(.[]; . == $l)')
              if [[ "$HAS" != "true" ]]; then
                gh api repos/"$REPO"/labels -f name="$LABEL" -f color="0075ca" >/dev/null 2>&1 || true
                gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels -f "labels[]=$LABEL"
              fi
            else
              echo "Login '$REVIEWER_LOGIN' not in org member map — skipping"
            fi
          else
            ALL_LABELS=$(gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels --jq '[.[].name]')
            REVIEWER_LOGINS=$(gh api repos/"$REPO"/pulls/"$PR_NUMBER" --jq '.requested_reviewers[].login')
            while IFS= read -r LOGIN; do
              [[ -z "$LOGIN" ]] && continue
              SIMPLE_NAME="${LOGIN_TO_LABEL[$LOGIN]:-}"
              if [[ -z "$SIMPLE_NAME" ]]; then
                echo "Login '$LOGIN' not in org member map — skipping"
                continue
              fi
              LABEL="reviewer:$SIMPLE_NAME"
              HAS=$(echo "$ALL_LABELS" | jq --arg l "$LABEL" 'any(.[]; . == $l)')
              if [[ "$HAS" != "true" ]]; then
                gh api repos/"$REPO"/labels -f name="$LABEL" -f color="0075ca" >/dev/null 2>&1 || true
                gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels -f "labels[]=$LABEL"
              fi
            done <<< "$REVIEWER_LOGINS"
          fi
          set_pr_status "$PR_NODE_ID" "$PR_NUMBER" "$REPO"

  # ── pull_request_target: review_request_removed ──────────────────────────
  review-request-removed:
    if: inputs.event_name == 'pull_request_target' && inputs.action == 'review_request_removed'
    runs-on: ubuntu-latest
    steps:
      - uses: dbbuilder-org/.github/.github/actions/write-helpers@main
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
      - env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PROJECT_ID: ${{ inputs.PROJECT_ID }}
          PR_STATUS_FIELD_ID: ${{ inputs.PR_STATUS_FIELD_ID }}
          OPT_UNASSIGNED: ${{ inputs.OPT_UNASSIGNED }}
          OPT_IN_QUEUE: ${{ inputs.OPT_IN_QUEUE }}
          OPT_BLOCKED: ${{ inputs.OPT_BLOCKED }}
          OPT_ON_HOLD: ${{ inputs.OPT_ON_HOLD }}
          OPT_MERGED: ${{ inputs.OPT_MERGED }}
          OPT_CLOSED: ${{ inputs.OPT_CLOSED }}
          PR_NODE_ID: ${{ inputs.pr_node_id }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.repo }}
          ORG: ${{ inputs.org }}
          REVIEWER_LOGIN: ${{ inputs.reviewer_login }}
        run: |
          source /tmp/pr-helpers.sh
          build_member_maps
          if [[ -n "$REVIEWER_LOGIN" ]]; then
            SIMPLE_NAME="${LOGIN_TO_LABEL[$REVIEWER_LOGIN]:-}"
            if [[ -n "$SIMPLE_NAME" ]]; then
              ENCODED=$(printf '%s' "reviewer:$SIMPLE_NAME" | sed 's/:/%3A/g')
              gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels/"$ENCODED" -X DELETE || true
            else
              echo "Login '$REVIEWER_LOGIN' not in org member map — skipping"
            fi
          else
            REVIEWERS=$(gh api repos/"$REPO"/pulls/"$PR_NUMBER" \
              --jq '[.requested_reviewers[].login] | join(" ")')
            ALL_LABELS=$(gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels --jq '[.[].name]')
            CURRENT_REVIEWER_LABELS=$(echo "$ALL_LABELS" | jq -r '.[] | select(startswith("reviewer:"))')
            declare -A REMAINING_REVIEWERS
            for LOGIN in $REVIEWERS; do
              SIMPLE_NAME="${LOGIN_TO_LABEL[$LOGIN]:-}"
              [[ -n "$SIMPLE_NAME" ]] && REMAINING_REVIEWERS["reviewer:$SIMPLE_NAME"]=1
            done
            while IFS= read -r RLABEL; do
              [[ -z "$RLABEL" ]] && continue
              if [[ -z "${REMAINING_REVIEWERS[$RLABEL]+x}" ]]; then
                ENCODED=$(printf '%s' "$RLABEL" | sed 's/:/%3A/g')
                gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels/"$ENCODED" -X DELETE || true
              fi
            done <<< "$CURRENT_REVIEWER_LABELS"
          fi
          set_pr_status "$PR_NODE_ID" "$PR_NUMBER" "$REPO"

  # ── pull_request_target: labeled ─────────────────────────────────────────
  labeled:
    if: inputs.event_name == 'pull_request_target' && inputs.action == 'labeled'
    runs-on: ubuntu-latest
    steps:
      - uses: dbbuilder-org/.github/.github/actions/write-helpers@main
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
      - env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PROJECT_ID: ${{ inputs.PROJECT_ID }}
          PR_STATUS_FIELD_ID: ${{ inputs.PR_STATUS_FIELD_ID }}
          OPT_UNASSIGNED: ${{ inputs.OPT_UNASSIGNED }}
          OPT_IN_QUEUE: ${{ inputs.OPT_IN_QUEUE }}
          OPT_BLOCKED: ${{ inputs.OPT_BLOCKED }}
          OPT_ON_HOLD: ${{ inputs.OPT_ON_HOLD }}
          OPT_MERGED: ${{ inputs.OPT_MERGED }}
          OPT_CLOSED: ${{ inputs.OPT_CLOSED }}
          PR_NODE_ID: ${{ inputs.pr_node_id }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.repo }}
          ORG: ${{ inputs.org }}
          LABEL_NAME: ${{ inputs.label_name }}
        run: |
          source /tmp/pr-helpers.sh
          if [[ "${LABEL_NAME,,}" == reviewer:* ]]; then
            build_member_maps
            SIMPLE_NAME="${LABEL_NAME#*:}"
            LOGIN="${LABEL_TO_LOGIN[${SIMPLE_NAME,,}]:-}"
            if [[ -n "$LOGIN" ]]; then
              gh api repos/"$REPO"/pulls/"$PR_NUMBER"/requested_reviewers \
                -f "reviewers[]=$LOGIN"
            else
              echo "No org member maps to label '$LABEL_NAME' — skipping reviewer add"
            fi
          fi
          set_pr_status "$PR_NODE_ID" "$PR_NUMBER" "$REPO"

  # ── pull_request_target: unlabeled ───────────────────────────────────────
  unlabeled:
    if: inputs.event_name == 'pull_request_target' && inputs.action == 'unlabeled'
    runs-on: ubuntu-latest
    steps:
      - uses: dbbuilder-org/.github/.github/actions/write-helpers@main
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
      - env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PROJECT_ID: ${{ inputs.PROJECT_ID }}
          PR_STATUS_FIELD_ID: ${{ inputs.PR_STATUS_FIELD_ID }}
          OPT_UNASSIGNED: ${{ inputs.OPT_UNASSIGNED }}
          OPT_IN_QUEUE: ${{ inputs.OPT_IN_QUEUE }}
          OPT_BLOCKED: ${{ inputs.OPT_BLOCKED }}
          OPT_ON_HOLD: ${{ inputs.OPT_ON_HOLD }}
          OPT_MERGED: ${{ inputs.OPT_MERGED }}
          OPT_CLOSED: ${{ inputs.OPT_CLOSED }}
          PR_NODE_ID: ${{ inputs.pr_node_id }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.repo }}
          ORG: ${{ inputs.org }}
          LABEL_NAME: ${{ inputs.label_name }}
        run: |
          source /tmp/pr-helpers.sh
          if [[ "${LABEL_NAME,,}" == reviewer:* ]]; then
            build_member_maps
            SIMPLE_NAME="${LABEL_NAME#*:}"
            LOGIN="${LABEL_TO_LOGIN[${SIMPLE_NAME,,}]:-}"
            if [[ -n "$LOGIN" ]]; then
              gh api repos/"$REPO"/pulls/"$PR_NUMBER"/requested_reviewers \
                -X DELETE -f "reviewers[]=$LOGIN"
            else
              echo "No org member maps to label '$LABEL_NAME' — skipping reviewer remove"
            fi
          fi
          set_pr_status "$PR_NODE_ID" "$PR_NUMBER" "$REPO"

  # ── pull_request_review: submitted (changes_requested) ───────────────────
  review-submitted:
    if: inputs.event_name == 'pull_request_review' && inputs.action == 'submitted' && (inputs.review_state == 'changes_requested' || inputs.review_state == 'CHANGES_REQUESTED')
    runs-on: ubuntu-latest
    steps:
      - uses: dbbuilder-org/.github/.github/actions/write-helpers@main
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
      - env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PROJECT_ID: ${{ inputs.PROJECT_ID }}
          PR_STATUS_FIELD_ID: ${{ inputs.PR_STATUS_FIELD_ID }}
          OPT_UNASSIGNED: ${{ inputs.OPT_UNASSIGNED }}
          OPT_IN_QUEUE: ${{ inputs.OPT_IN_QUEUE }}
          OPT_BLOCKED: ${{ inputs.OPT_BLOCKED }}
          OPT_ON_HOLD: ${{ inputs.OPT_ON_HOLD }}
          OPT_MERGED: ${{ inputs.OPT_MERGED }}
          OPT_CLOSED: ${{ inputs.OPT_CLOSED }}
          PR_NODE_ID: ${{ inputs.pr_node_id }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.repo }}
        run: |
          source /tmp/pr-helpers.sh
          gh api repos/"$REPO"/labels -f name=".needs-changes" -f color="e11d48" >/dev/null 2>&1 || true
          gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels -f "labels[]=.needs-changes"
          set_pr_status "$PR_NODE_ID" "$PR_NUMBER" "$REPO"

  # ── pull_request_review: dismissed ───────────────────────────────────────
  review-dismissed:
    if: inputs.event_name == 'pull_request_review' && inputs.action == 'dismissed'
    runs-on: ubuntu-latest
    steps:
      - uses: dbbuilder-org/.github/.github/actions/write-helpers@main
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
      - env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PROJECT_ID: ${{ inputs.PROJECT_ID }}
          PR_STATUS_FIELD_ID: ${{ inputs.PR_STATUS_FIELD_ID }}
          OPT_UNASSIGNED: ${{ inputs.OPT_UNASSIGNED }}
          OPT_IN_QUEUE: ${{ inputs.OPT_IN_QUEUE }}
          OPT_BLOCKED: ${{ inputs.OPT_BLOCKED }}
          OPT_ON_HOLD: ${{ inputs.OPT_ON_HOLD }}
          OPT_MERGED: ${{ inputs.OPT_MERGED }}
          OPT_CLOSED: ${{ inputs.OPT_CLOSED }}
          PR_NODE_ID: ${{ inputs.pr_node_id }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.repo }}
        run: |
          source /tmp/pr-helpers.sh
          PENDING=$(gh api repos/"$REPO"/pulls/"$PR_NUMBER"/reviews \
            --jq '[.[] | select(.state == "CHANGES_REQUESTED")] | length')
          if [[ "$PENDING" -eq 0 ]]; then
            gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels/%2Eneeds-changes -X DELETE || true
          fi
          set_pr_status "$PR_NODE_ID" "$PR_NUMBER" "$REPO"

  # ── pull_request_target: closed ──────────────────────────────────────────
  pr-closed:
    if: inputs.event_name == 'pull_request_target' && inputs.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: dbbuilder-org/.github/.github/actions/write-helpers@main
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
      - env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PROJECT_ID: ${{ inputs.PROJECT_ID }}
          PR_STATUS_FIELD_ID: ${{ inputs.PR_STATUS_FIELD_ID }}
          OPT_UNASSIGNED: ${{ inputs.OPT_UNASSIGNED }}
          OPT_IN_QUEUE: ${{ inputs.OPT_IN_QUEUE }}
          OPT_BLOCKED: ${{ inputs.OPT_BLOCKED }}
          OPT_ON_HOLD: ${{ inputs.OPT_ON_HOLD }}
          OPT_MERGED: ${{ inputs.OPT_MERGED }}
          OPT_CLOSED: ${{ inputs.OPT_CLOSED }}
          PR_NODE_ID: ${{ inputs.pr_node_id }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.repo }}
        run: |
          source /tmp/pr-helpers.sh
          set_pr_status "$PR_NODE_ID" "$PR_NUMBER" "$REPO"

  # ── repository_dispatch: tile dragged on board ───────────────────────────
  pr-dragged:
    if: inputs.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: dbbuilder-org/.github/.github/actions/write-helpers@main
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
      - env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PROJECT_ID: ${{ inputs.PROJECT_ID }}
          PR_STATUS_FIELD_ID: ${{ inputs.PR_STATUS_FIELD_ID }}
          OPT_UNASSIGNED: ${{ inputs.OPT_UNASSIGNED }}
          OPT_IN_QUEUE: ${{ inputs.OPT_IN_QUEUE }}
          OPT_BLOCKED: ${{ inputs.OPT_BLOCKED }}
          OPT_ON_HOLD: ${{ inputs.OPT_ON_HOLD }}
          OPT_MERGED: ${{ inputs.OPT_MERGED }}
          OPT_CLOSED: ${{ inputs.OPT_CLOSED }}
          CONTENT_NODE_ID: ${{ inputs.content_node_id }}
          OLD_STATUS: ${{ inputs.old_status }}
          NEW_STATUS: ${{ inputs.new_status }}
          SENDER: ${{ inputs.sender }}
        run: |
          source /tmp/pr-helpers.sh

          PR_INFO=$(gh api graphql -f query='
            query($id: ID!) {
              node(id: $id) {
                ... on PullRequest {
                  number
                  repository { nameWithOwner }
                }
              }
            }' -f id="$CONTENT_NODE_ID" \
            --jq '.data.node | "\(.number) \(.repository.nameWithOwner)"')
          PR_NUMBER=$(echo "$PR_INFO" | cut -d' ' -f1)
          REPO=$(echo "$PR_INFO" | cut -d' ' -f2-)

          if [[ "$OLD_STATUS" == "Blocked" && "$NEW_STATUS" != "Blocked" ]]; then
            gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels/%2Eneeds-changes -X DELETE || true
            gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels/%2Equestion -X DELETE || true
            gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels/%2Eneeds-decision -X DELETE || true
          fi

          if [[ "$OLD_STATUS" == "On Hold" && "$NEW_STATUS" != "On Hold" ]]; then
            gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels/%2Ehold -X DELETE || true
          fi

          if [[ "$NEW_STATUS" == "Blocked" ]]; then
            HAS_BLOCKING=$(gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels \
              --jq 'any(.[].name; . == ".needs-changes" or . == ".question")')
            if [[ "$HAS_BLOCKING" != "true" && "$SENDER" != *"[bot]"* ]]; then
              gh api repos/"$REPO"/labels -f name=".needs-changes" -f color="e11d48" >/dev/null 2>&1 || true
              gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels -f "labels[]=.needs-changes"
            fi
          elif [[ "$NEW_STATUS" == "On Hold" ]]; then
            gh api repos/"$REPO"/labels -f name=".hold" -f color="e11d48" >/dev/null 2>&1 || true
            gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels -f "labels[]=.hold"
          elif [[ "$NEW_STATUS" == "Unassigned" ]]; then
            REVIEWER_LOGINS=$(gh api repos/"$REPO"/pulls/"$PR_NUMBER" \
              --jq '.requested_reviewers[].login')
            while IFS= read -r LOGIN; do
              [[ -z "$LOGIN" ]] && continue
              gh api repos/"$REPO"/pulls/"$PR_NUMBER"/requested_reviewers \
                -X DELETE -f "reviewers[]=$LOGIN"
            done <<< "$REVIEWER_LOGINS"
            REVIEWER_LABELS=$(gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels \
              --jq '[.[].name] | .[] | select(startswith("reviewer:"))')
            while IFS= read -r RLABEL; do
              [[ -z "$RLABEL" ]] && continue
              ENCODED=$(printf '%s' "$RLABEL" | sed 's/:/%3A/g')
              gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels/"$ENCODED" -X DELETE || true
            done <<< "$REVIEWER_LABELS"
          fi

          set_pr_status "$CONTENT_NODE_ID" "$PR_NUMBER" "$REPO"

  # ── schedule / workflow_dispatch ─────────────────────────────────────────
  scheduled:
    if: inputs.event_name == 'schedule' || inputs.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: dbbuilder-org/.github/.github/actions/write-helpers@main
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
      - env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PROJECT_ID: ${{ inputs.PROJECT_ID }}
          PR_STATUS_FIELD_ID: ${{ inputs.PR_STATUS_FIELD_ID }}
          ITERATION_FIELD_ID: ${{ inputs.ITERATION_FIELD_ID }}
          OPT_UNASSIGNED: ${{ inputs.OPT_UNASSIGNED }}
          OPT_IN_QUEUE: ${{ inputs.OPT_IN_QUEUE }}
          OPT_BLOCKED: ${{ inputs.OPT_BLOCKED }}
          OPT_ON_HOLD: ${{ inputs.OPT_ON_HOLD }}
          OPT_MERGED: ${{ inputs.OPT_MERGED }}
          OPT_CLOSED: ${{ inputs.OPT_CLOSED }}
          REPO: ${{ inputs.repo }}
          ORG: ${{ inputs.org }}
        run: |
          source /tmp/pr-helpers.sh
          build_member_maps

          PR_NUMBERS=$(gh api "repos/$REPO/pulls?state=open&per_page=100" --paginate --jq '.[].number')

          for PR_NUMBER in $PR_NUMBERS; do
            PR_DATA=$(gh api repos/"$REPO"/pulls/"$PR_NUMBER" --jq '{
              node_id: .node_id,
              reviewers: ([.requested_reviewers[].login] | join(" ")),
              base_ref: .base.ref
            }')
            PR_NODE_ID=$(echo "$PR_DATA" | jq -r '.node_id')
            REVIEWERS=$(echo "$PR_DATA" | jq -r '.reviewers')
            BASE_REF=$(echo "$PR_DATA" | jq -r '.base_ref')

            ALL_LABELS=$(gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels --jq '[.[].name]')

            # ── Ensure base: label ───────────────────────────────────────
            BASE_LABEL="base:$BASE_REF"
            HAS_BASE=$(echo "$ALL_LABELS" | jq --arg l "$BASE_LABEL" 'any(.[]; . == $l)')
            if [[ "$HAS_BASE" != "true" ]]; then
              gh api repos/"$REPO"/labels -f name="$BASE_LABEL" -f color="0e8a16" >/dev/null 2>&1 || true
              gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels -f "labels[]=$BASE_LABEL"
            fi

            # ── Add labels for reviewers that don't have one ─────────────
            for LOGIN in $REVIEWERS; do
              SIMPLE_NAME="${LOGIN_TO_LABEL[$LOGIN]:-}"
              if [[ -z "$SIMPLE_NAME" ]]; then
                echo "PR #$PR_NUMBER: '$LOGIN' not in org map — skipping"
                continue
              fi
              LABEL="reviewer:$SIMPLE_NAME"
              HAS=$(echo "$ALL_LABELS" | jq --arg l "$LABEL" 'any(.[]; . == $l)')
              if [[ "$HAS" != "true" ]]; then
                echo "PR #$PR_NUMBER: adding missing label '$LABEL' for reviewer '$LOGIN'"
                gh api repos/"$REPO"/labels -f name="$LABEL" -f color="0075ca" >/dev/null 2>&1 || true
                gh api repos/"$REPO"/issues/"$PR_NUMBER"/labels -f "labels[]=$LABEL"
              fi
            done

            # ── Add reviewers for reviewer: labels that don't have one ───
            REVIEWER_LABELS=$(echo "$ALL_LABELS" | jq -r '.[] | select(startswith("reviewer:"))')
            while IFS= read -r RLABEL; do
              [[ -z "$RLABEL" ]] && continue
              SIMPLE_NAME="${RLABEL#*:}"
              EXPECTED_LOGIN="${LABEL_TO_LOGIN[${SIMPLE_NAME,,}]:-}"
              if [[ -z "$EXPECTED_LOGIN" ]]; then
                echo "PR #$PR_NUMBER: label '$RLABEL' has no matching org member — skipping"
                continue
              fi
              if [[ ! " $REVIEWERS " =~ " $EXPECTED_LOGIN " ]]; then
                echo "PR #$PR_NUMBER: adding missing reviewer '$EXPECTED_LOGIN' for label '$RLABEL'"
                gh pr edit "$PR_NUMBER" --repo "$REPO" --add-reviewer "$EXPECTED_LOGIN" || true
              fi
            done <<< "$REVIEWER_LABELS"

            ITEM_ID=$(get_item_id "$PR_NODE_ID")
            assign_iteration "$ITEM_ID"
            set_pr_status "$PR_NODE_ID" "$PR_NUMBER" "$REPO"
          done

          # ── Sync closed/merged PRs that have a stale (non-terminal) status ───
          echo "Checking for closed/merged PRs with stale project status..."
          STALE_CURSOR=""
          while true; do
            STALE_CURSOR_ARG=()
            [[ -n "$STALE_CURSOR" ]] && STALE_CURSOR_ARG=(-f after="$STALE_CURSOR")
            STALE_PAGE=$(gh api graphql \
              -f proj="$PROJECT_ID" \
              "${STALE_CURSOR_ARG[@]}" \
              -f query='
                query($proj: ID!, $after: String) {
                  node(id: $proj) {
                    ... on ProjectV2 {
                      items(first: 100, after: $after) {
                        pageInfo { hasNextPage endCursor }
                        nodes {
                          fieldValues(first: 20) {
                            nodes {
                              ... on ProjectV2ItemFieldSingleSelectValue {
                                field { ... on ProjectV2SingleSelectField { id } }
                                optionId
                              }
                            }
                          }
                          content {
                            ... on PullRequest {
                              id
                              state
                              number
                              repository { nameWithOwner }
                            }
                          }
                        }
                      }
                    }
                  }
                }')
            while IFS=$'\t' read -r STALE_NODE_ID STALE_NUMBER STALE_REPO; do
              [[ -z "$STALE_NODE_ID" ]] && continue
              echo "Syncing stuck PR #$STALE_NUMBER in $STALE_REPO"
              set_pr_status "$STALE_NODE_ID" "$STALE_NUMBER" "$STALE_REPO"
            done < <(echo "$STALE_PAGE" | jq -r \
              --arg field "$PR_STATUS_FIELD_ID" \
              --arg merged "$OPT_MERGED" \
              --arg closed "$OPT_CLOSED" '
              .data.node.items.nodes[] |
              select(
                (.content.state? == "CLOSED" or .content.state? == "MERGED") and
                ([.fieldValues.nodes[] |
                  select(.field?.id? == $field) |
                  .optionId] |
                  any(. == $merged or . == $closed) | not)
              ) |
              "\(.content.id)\t\(.content.number)\t\(.content.repository.nameWithOwner)"')
            STALE_HAS_NEXT=$(echo "$STALE_PAGE" | jq -r '.data.node.items.pageInfo.hasNextPage')
            [[ "$STALE_HAS_NEXT" != "true" ]] && break
            STALE_CURSOR=$(echo "$STALE_PAGE" | jq -r '.data.node.items.pageInfo.endCursor')
          done

          # ── Backfill: assign iteration to any project item still missing one ─
          # Covers PRs from all repos in the project, not just $REPO.
          if [[ -z "$ITERATION_FIELD_ID" ]]; then
            echo "Backfill: ITERATION_FIELD_ID not set — skipping."
          else
            BACKFILL_TODAY=$(date -u +%s)
            TARGET_ITER=$(gh api graphql -f query='
              query($proj: ID!) {
                node(id: $proj) {
                  ... on ProjectV2 {
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2IterationField {
                          configuration {
                            iterations { id startDate duration }
                          }
                        }
                      }
                    }
                  }
                }
              }' \
              -f proj="$PROJECT_ID" \
              --jq "
                [.data.node.fields.nodes[] |
                 select(.configuration != null) |
                 .configuration.iterations[] |
                 {id, start: (.startDate | strptime(\"%Y-%m-%d\") | mktime),
                  end:  ((.startDate | strptime(\"%Y-%m-%d\") | mktime) + (.duration * 86400))}] as \$iters |
                (
                  (\$iters | map(select(.start <= $BACKFILL_TODAY and .end > $BACKFILL_TODAY)) | .[0])
                  // (\$iters | map(select(.start > $BACKFILL_TODAY)) | sort_by(.start) | .[0])
                ) | .id // empty" \
              | head -1)

            if [[ -z "$TARGET_ITER" ]]; then
              echo "Backfill: no current or upcoming iteration found — skipping."
            else
              echo "Backfill: target iteration $TARGET_ITER"

              # Paginate through all project items to find open PRs missing an iteration
              CURSOR=""
              BACKFILL_COUNT=0
              while true; do
                CURSOR_ARG=()
                [[ -n "$CURSOR" ]] && CURSOR_ARG=(-f after="$CURSOR")
                PAGE=$(gh api graphql \
                  -f proj="$PROJECT_ID" \
                  "${CURSOR_ARG[@]}" \
                  -f query='
                    query($proj: ID!, $after: String) {
                      node(id: $proj) {
                        ... on ProjectV2 {
                          items(first: 100, after: $after) {
                            pageInfo { hasNextPage endCursor }
                            nodes {
                              id
                              fieldValues(first: 20) {
                                nodes {
                                  ... on ProjectV2ItemFieldIterationValue { iterationId }
                                }
                              }
                              content {
                                ... on PullRequest { state }
                              }
                            }
                          }
                        }
                      }
                    }')

                UNASSIGNED=$(echo "$PAGE" | jq -r '
                  [.data.node.items.nodes[] |
                    select(.content.state? == "OPEN") |
                    select([.fieldValues.nodes[] | select(.iterationId != null)] | length == 0) |
                    .id] | .[]')

                while IFS= read -r ITEM_ID; do
                  [[ -z "$ITEM_ID" ]] && continue
                  echo "Backfill: assigning iteration to item $ITEM_ID"
                  gh api graphql -f query='
                    mutation($proj: ID!, $item: ID!, $field: ID!, $iter: String!) {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: $proj, itemId: $item,
                        fieldId: $field, value: { iterationId: $iter }
                      }) { projectV2Item { id } }
                    }' \
                    -f proj="$PROJECT_ID" -f item="$ITEM_ID" \
                    -f field="$ITERATION_FIELD_ID" -f iter="$TARGET_ITER"
                  (( BACKFILL_COUNT++ ))
                done <<< "$UNASSIGNED"

                HAS_NEXT=$(echo "$PAGE" | jq -r '.data.node.items.pageInfo.hasNextPage')
                [[ "$HAS_NEXT" != "true" ]] && break
                CURSOR=$(echo "$PAGE" | jq -r '.data.node.items.pageInfo.endCursor')
              done

              echo "Backfill: done — $BACKFILL_COUNT item(s) updated."
            fi
          fi
