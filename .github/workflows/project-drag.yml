name: Project Board Drag Handler

on:
  repository_dispatch:
    types: [project_drag]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # Routes a human-initiated drag of the PR Status field to the reusable
  # pr-status-sync workflow, scoped to whichever project board the drag
  # happened on. To add a board, add another job below with its IDs — the
  # sync logic itself lives only in pr-status-sync.yml.

  handle-drag-fireproof:
    if: github.event.client_payload.field_node_id == 'PVTSSF_lADODmqj9M4BZMhdzhUg79k'
    uses: dbbuilder-org/.github/.github/workflows/pr-status-sync.yml@main
    with:
      PROJECT_ID: "PVT_kwDODmqj9M4BZMhd"
      PR_STATUS_FIELD_ID: "PVTSSF_lADODmqj9M4BZMhdzhUg79k"
      OPT_UNASSIGNED: "faf07413"
      OPT_IN_QUEUE: "92a631df"
      OPT_BLOCKED: "408eadfa"
      OPT_ON_HOLD: "70e50c11"
      OPT_MERGED: "1292fa0e"
      OPT_CLOSED: "c7fd025a"
      event_name: repository_dispatch
      repo: ""
      content_node_id: ${{ github.event.client_payload.content_node_id }}
      old_status: ${{ github.event.client_payload.from_status }}
      new_status: ${{ github.event.client_payload.to_status }}
      sender: ${{ github.event.client_payload.sender }}
    secrets:
      app_id: ${{ secrets.WORKFLOW_APP_ID }}
      app_private_key: ${{ secrets.WORKFLOW_APP_PRIVATE_KEY }}
