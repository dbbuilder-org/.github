name: Sync PR Status to Project

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - closed
      - review_requested
      - review_request_removed
      - labeled
      - unlabeled
  pull_request_review:
    types:
      - submitted
      - dismissed
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  sync:
    uses: dbbuilder-org/.github/.github/workflows/pr-status-sync.yml@main
    with:
      PROJECT_ID: "PVT_kwDODmqj9M4Bda28"
      PR_STATUS_FIELD_ID: "PVTSSF_lADODmqj9M4Bda28zhX8h7Q"
      OPT_UNASSIGNED: "61e4505c"
      OPT_IN_QUEUE: "47fc9ee4"
      OPT_BLOCKED: "fd63df97"
      OPT_ON_HOLD: "df73e18b"
      OPT_MERGED: "98236657"
      OPT_CLOSED: "4ad4d27e"
      event_name: ${{ github.event_name }}
      repo: ${{ github.repository }}
      org: ${{ github.repository_owner }}
      pr_node_id: ${{ github.event.pull_request.node_id }}
      pr_number: ${{ github.event.pull_request.number }}
      action: ${{ github.event.action }}
      label_name: ${{ github.event.label.name }}
      review_state: ${{ github.event.review.state }}
      reviewer_login: ${{ github.event.requested_reviewer.login }}
      sender: ${{ github.event.sender.login }}
    secrets:
      app_id: ${{ secrets.WORKFLOW_APP_ID }}
      app_private_key: ${{ secrets.WORKFLOW_APP_PRIVATE_KEY }}
